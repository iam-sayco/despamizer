name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: python -m pip install "poetry==1.8.5"

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: python -m pip install "poetry==1.8.5"

      - name: Install dependencies
        run: poetry install --only main --no-interaction --no-ansi

      - name: Upgrade virtualenv pip
        run: poetry run python -m pip install --upgrade pip

      - name: Install pip-audit
        run: poetry run python -m pip install pip-audit

      - name: Run pip-audit
        run: poetry run pip-audit --timeout 60

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-scan:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
